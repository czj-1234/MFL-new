seed: 42

data:
  train_json: data/processed/mvsa_6class_train.json
  val_json: data/processed/mvsa_6class_val.json
  test_json: data/processed/mvsa_6class_test.json
  num_classes: 6

model:
  tokenizer_name: distilbert-base-uncased
  text_model_name: distilbert-base-uncased
  image_hidden_dim: 128
  text_hidden_dim: 128
  projector_hidden_dim: 128
  dropout: 0.1
  freeze_image_backbone: true
  freeze_text_backbone: true
  pretrained_image: true

federated:
  num_clients: 6

  # fixed = use samples_per_client
  # full  = use all training samples
  partition_mode: full

  # ignored when partition_mode is full
  samples_per_client: null

  allow_overlap: false
  rounds: 250
  local_epochs: 1
  lr: 0.0005
  batch_size: 32
  max_local_steps: null

evaluation:
  eval_batch_size: 64
  max_train_eval_samples: 300
  max_val_eval_samples: null
  max_test_eval_samples: null
  max_text_len: 64
  num_workers: 4

experiment:
  setting_name: modality_exclusive
  association: iid
  output_root: results/structure_baseline
  analysis_rounds: [1, 5, 10, 20, 30, 50, 80, 100, 150, 200, 250]

update:
  target_patterns:
    - multi_modal_projector.0.weight
    - multi_modal_projector.0.bias
    - classifier.weight
    - classifier.bias