seed: 42

data:
  train_json: data/processed/hateful_train.json
  val_json: data/processed/hateful_val.json
  test_json: data/processed/hateful_test.json
  num_classes: 2

model:
  tokenizer_name: roberta-base
  text_model_name: roberta-base
  image_model_name: openai/clip-vit-base-patch32

  image_hidden_dim: 256
  text_hidden_dim: 256
  projector_hidden_dim: 256
  dropout: 0.4

  freeze_image_backbone: false
  freeze_text_backbone: false
  pretrained_image: true

federated:
  num_clients: 4

  # First Hateful Memes baseline: no repeated sampling
  partition_mode: full
  samples_per_client: 2000
  allow_overlap: false

  rounds: 30
  local_epochs: 1
  lr: 0.000005
  weight_decay: 0.03
  batch_size: 64
  max_local_steps: null

  # FedAvg = 0.0, FedProx = 0.001
  fedprox_mu: 0.001

evaluation:
  eval_batch_size: 128
  max_train_eval_samples: 3000
  max_val_eval_samples: null
  max_test_eval_samples: null
  max_text_len: 77
  num_workers: 8

experiment:
  setting_name: modality_exclusive
  association: iid
  output_root: results/hateful_2class_full_fedprox001
  analysis_rounds: [1, 5, 10, 20, 30]

update:
  target_patterns:
    - classifier
    - multi_modal_projector